name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    # macos-15 ships Xcode 16 + Swift 6, which has the `Testing` module
    # the test suite uses. macos-14 only has Xcode 15 / Swift 5.10 and
    # fails with `no such module 'Testing'`.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
