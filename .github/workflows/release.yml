name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package binary
        run: |
          ARCH=$(uname -m)
          tar -czf sws-${{ github.ref_name }}-macos-${ARCH}.tar.gz -C .build/release sws

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sws-*.tar.gz
          generate_release_notes: true
